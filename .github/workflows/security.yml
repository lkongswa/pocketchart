name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 13 * * 1'  # Mondays 1pm UTC

jobs:
  audit:
    name: npm audit + gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks scans full history on push to main

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: npm audit
        run: |
          npm ci --ignore-scripts
          npm audit --audit-level=high

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
