name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild trusted native deps
        # `.npmrc` sets ignore-scripts=true to block arbitrary postinstall
        # code from compromised packages. The five packages below
        # legitimately need install scripts (native compile or binary
        # download) and are rebuilt explicitly. See SECURITY.md.
        run: npm run deps:setup

      - name: Build app
        env:
          AIRTABLE_FEEDBACK_PAT: ${{ secrets.AIRTABLE_FEEDBACK_PAT }}
        run: npm run build

      - name: Build Windows installer (signed)
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish never

      - name: Verify publisher name matches signature (auto-update guard)
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path release -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "No installer found in release/"; exit 1 }
          ./test/update-harness/verify-publisher-match.ps1 `
            -ExePath $exe.FullName `
            -YmlPath release/win-unpacked/resources/app-update.yml

      - name: Create GitHub Release and upload assets
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $exe = Get-ChildItem -Path release -Filter "*.exe" | Select-Object -First 1
          $yml = Get-ChildItem -Path release -Filter "latest.yml" | Select-Object -First 1

          # Create the release
          gh release create $tag --title $tag --generate-notes --latest

          # Upload installer
          if ($exe) {
            gh release upload $tag $exe.FullName --clobber
          }

          # Upload latest.yml (required for electron-updater)
          if ($yml) {
            gh release upload $tag $yml.FullName --clobber
          }
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: PocketChart-Windows
          path: release/*.exe
